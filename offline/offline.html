<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1B5E20">
  <title>BoviLogic – Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #1B5E20 0%, #388E3C 100%);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; padding: 24px; text-align: center;
    }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 1.75rem; margin-bottom: 12px; }
    p  { opacity: 0.85; max-width: 320px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      color: #fff; padding: 12px 32px;
      border-radius: 999px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: rgba(255,255,255,0.3); }
    .status { font-size: 0.875rem; opacity: 0.7; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="icon">🐄</div>
  <h1>You're Offline</h1>
  <p>BoviLogic is working to reconnect. Any changes you make will be saved and synced when you're back online.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
  <p class="status" id="status">Checking connection...</p>

  <script>
    function check() {
      document.getElementById('status').textContent =
        navigator.onLine ? 'Connected – redirecting...' : 'No connection detected.';
      if (navigator.onLine) setTimeout(() => window.location = '/', 1000);
    }
    window.addEventListener('online', check);
    check();
  </script>
</body>
</html>
